# Connectivity Intelligence Suite Configuration

app:
  name: "Connectivity Intelligence Suite"
  version: "1.0.0"
  log_level: "INFO"

network:
  ping_timeout_ms: 2000
  tcp_timeout_ms: 2000
  dns_timeout_ms: 3000
  max_concurrent_tasks: 100

paths:
  inputs_dir: "inputs"
  outputs_dir: "outputs"
  logs_dir: "logs"

profiles:
  - name: "No VPN"
    description: "Direct connection baseline"
  - name: "With VPN"
    description: "Connection through primary VPN tunnel"
